<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 天津数据产权登记服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="js/api.js"></script>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .tab-btn {
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            border-bottom-color: #3b82f6;
            color: #3b82f6;
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="text-white">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-5xl grid lg:grid-cols-2 gap-8">
            <!-- 左侧：欢迎信息 -->
            <div class="hidden lg:flex flex-col justify-center space-y-6">
                <div>
                    <h1 class="text-4xl font-bold mb-4">天津数据产权登记服务平台</h1>
                    <p class="text-xl text-gray-300">构建权威、高效、可信的数据产权登记体系</p>
                </div>
                <div class="glass-card p-6 rounded-2xl space-y-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <span>安全可靠的数据产权登记</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <span>快速便捷的在线服务</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <span>全方位的权益保护</span>
                    </div>
                </div>
                <div class="text-sm text-gray-400">
                    <p>还没有账号？<a href="register-user.html" class="text-blue-400 hover:text-blue-300 underline">立即注册</a></p>
                </div>
            </div>

            <!-- 右侧：登录表单 -->
            <div class="glass-card p-8 rounded-2xl fade-in">
                <!-- 标签切换 -->
                <div class="flex mb-8 border-b border-gray-700">
                    <button onclick="switchTab('login')" id="loginTab" class="tab-btn active flex-1 py-3 text-center font-medium">
                        账号登录
                    </button>
                    <button onclick="switchTab('qrcode')" id="qrcodeTab" class="tab-btn flex-1 py-3 text-center font-medium text-gray-400">
                        扫码登录
                    </button>
                </div>

                <!-- 账号登录表单 -->
                <div id="loginFormContainer">
                    <form id="loginForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">手机号/账号</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                    </svg>
                                </span>
                                <input type="text" id="phone" required 
                                    class="input-field w-full pl-10 pr-4 py-3 rounded-lg"
                                    placeholder="请输入手机号或账号"
                                    autocomplete="username">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">密码</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                    </svg>
                                </span>
                                <input type="password" id="password" required 
                                    class="input-field w-full pl-10 pr-10 py-3 rounded-lg"
                                    placeholder="请输入密码"
                                    autocomplete="current-password">
                                <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white">
                                    <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between text-sm">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" id="rememberMe" class="mr-2 w-4 h-4 rounded border-gray-600 text-blue-600 focus:ring-blue-500">
                                <span class="text-gray-300">记住我</span>
                            </label>
                            <a href="#" onclick="showForgotPassword()" class="text-blue-400 hover:text-blue-300">忘记密码？</a>
                        </div>

                        <button type="submit" id="loginBtn" class="btn-primary w-full py-3 rounded-lg font-medium flex items-center justify-center">
                            <span id="btnText">登录</span>
                            <svg id="btnSpinner" class="loading-spinner hidden w-5 h-5 ml-2" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>

                    <div class="mt-6 text-center lg:hidden">
                        <p class="text-sm text-gray-400">
                            还没有账号？<a href="register-user.html" class="text-blue-400 hover:text-blue-300 underline">立即注册</a>
                        </p>
                    </div>

                    <div class="mt-8">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-700"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-gray-800 text-gray-400 rounded">测试账号</span>
                            </div>
                        </div>
                        <!-- <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
                            <button onclick="fillTestAccount('13800138000', '123456')" class="glass-card py-2 px-3 rounded-lg hover:bg-white hover:bg-opacity-10 transition-colors text-left">
                                <div class="font-medium">普通用户</div>
                                <div class="text-gray-400 text-xs">13800138000 / 123456</div>
                            </button>
                            <button onclick="fillTestAccount('admin', 'admin123')" class="glass-card py-2 px-3 rounded-lg hover:bg-white hover:bg-opacity-10 transition-colors text-left">
                                <div class="font-medium">管理员</div>
                                <div class="text-gray-400 text-xs">admin / admin123</div>
                            </button>
                        </div> -->
                    </div>
                </div>

                <!-- 扫码登录 -->
                <div id="qrcodeContainer" class="hidden text-center py-8">
                    <div class="w-48 h-48 mx-auto bg-white rounded-lg p-4 mb-4">
                        <!-- 这里应该显示真实的二维码 -->
                        <div class="w-full h-full bg-gray-200 rounded flex items-center justify-center text-gray-500 text-sm">
                            二维码区域<br>（演示）
                        </div>
                    </div>
                    <p class="text-gray-300">请使用微信或支付宝扫码登录</p>
                    <p class="text-sm text-gray-400 mt-2">扫码后请在手机上确认登录</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-4 right-4 hidden">
        <div class="glass-card px-6 py-3 rounded-lg flex items-center space-x-2 toast">
            <span id="toastIcon"></span>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script>
        // 切换标签
        function switchTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('text-gray-400');
                document.getElementById('qrcodeTab').classList.remove('active');
                document.getElementById('qrcodeTab').classList.add('text-gray-400');
                document.getElementById('loginFormContainer').classList.remove('hidden');
                document.getElementById('qrcodeContainer').classList.add('hidden');
            } else {
                document.getElementById('qrcodeTab').classList.add('active');
                document.getElementById('qrcodeTab').classList.remove('text-gray-400');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('loginTab').classList.add('text-gray-400');
                document.getElementById('loginFormContainer').classList.add('hidden');
                document.getElementById('qrcodeContainer').classList.remove('hidden');
            }
        }

        // 切换密码显示
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }

        // 填充测试账号
        function fillTestAccount(phone, password) {
            document.getElementById('phone').value = phone;
            document.getElementById('password').value = password;
            showToast('success', '测试账号已填充，请点击登录');
        }

        // 显示Toast提示
        function showToast(type, message) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');
            
            if (type === 'success') {
                toastIcon.innerHTML = '<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
            } else if (type === 'error') {
                toastIcon.innerHTML = '<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
            } else {
                toastIcon.innerHTML = '<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            }
            
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // 忘记密码
        function showForgotPassword() {
            showToast('info', '请联系管理员重置密码：400-123-4567');
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            if (!phone || !password) {
                showToast('error', '请输入账号和密码');
                return;
            }
            
            // 显示加载状态
            loginBtn.disabled = true;
            btnText.textContent = '登录中...';
            btnSpinner.classList.remove('hidden');
            
            try {
                console.log('开始登录:', phone);
                const result = await AuthAPI.login(phone, password, rememberMe);
                console.log('登录结果:', result);
                
                if (result.success) {
                    showToast('success', '登录成功！');
                    
                    // 延迟跳转
                    setTimeout(() => {
                        const user = result.data.user;
                        if (user.role === 'admin') {
                            window.location.href = '/admin/';
                        } else {
                            window.location.href = 'user.html';
                        }
                    }, 1000);
                } else {
                    showToast('error', result.message || '登录失败');
                    loginBtn.disabled = false;
                    btnText.textContent = '登录';
                    btnSpinner.classList.add('hidden');
                }
            } catch (error) {
                console.error('登录错误:', error);
                showToast('error', '网络错误，请稍后重试');
                loginBtn.disabled = false;
                btnText.textContent = '登录';
                btnSpinner.classList.add('hidden');
            }
        });

        // 页面加载时检查是否已登录
        document.addEventListener('DOMContentLoaded', () => {
            if (ApiService.isLoggedIn()) {
                const user = ApiService.getCurrentUser();
                if (user) {
                    if (user.role === 'admin') {
                        window.location.href = '/admin/';
                    } else {
                        window.location.href = 'user.html';
                    }
                }
            }
        });
    </script>
</body>
</html>
