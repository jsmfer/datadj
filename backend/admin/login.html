<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 天津数据产权登记服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>* { font-family: 'Noto Sans SC', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">管理后台登录</h1>
            <p class="text-gray-500 mt-2">天津数据产权登记服务平台</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">账号</label>
                <input type="text" id="phone" value="admin" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="请输入账号" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <input type="password" id="password" value="admin123" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors">
                登录
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>默认账号: admin / admin123</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const API_BASE = 'http://localhost:3002/api';
            
            console.log('[登录页] 脚本加载完成');
            
            // 页面加载时检查登录状态
            function checkLoginStatus() {
                const token = localStorage.getItem('adminToken');
                if (!token) {
                    console.log('[登录页] 无token，显示登录表单');
                    return;
                }
                
                console.log('[登录页] 发现token，验证中...');
                
                fetch(API_BASE + '/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    if (result.success && result.data && 
                        (result.data.role === 'admin' || result.data.role === 'regulator')) {
                        console.log('[登录页] Token有效，跳转到后台');
                        window.location.href = 'index.html';
                    } else {
                        console.log('[登录页] Token无效或权限不足');
                        localStorage.removeItem('adminToken');
                    }
                })
                .catch(function(err) {
                    console.log('[登录页] 验证失败:', err);
                    localStorage.removeItem('adminToken');
                });
            }
            
            // 登录处理
            function handleLogin(e) {
                e.preventDefault();
                
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');
                
                if (!phone || !password) {
                    alert('请输入账号和密码');
                    return;
                }
                
                loginBtn.disabled = true;
                loginBtn.textContent = '登录中...';
                
                console.log('[登录页] 开始登录:', phone);
                
                fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone, password: password })
                })
                .then(function(res) { return res.json(); })
                .then(function(result) {
                    console.log('[登录页] 登录响应:', result);
                    
                    if (!result.success) {
                        alert(result.message || '登录失败');
                        loginBtn.disabled = false;
                        loginBtn.textContent = '登录';
                        return;
                    }
                    
                    var role = result.data.user.role;
                    if (role !== 'admin' && role !== 'regulator') {
                        alert('您没有管理员权限');
                        loginBtn.disabled = false;
                        loginBtn.textContent = '登录';
                        return;
                    }
                    
                    // 保存token
                    localStorage.setItem('adminToken', result.data.token);
                    console.log('[登录页] 登录成功，准备跳转');
                    
                    // 跳转到后台
                    window.location.href = 'index.html';
                })
                .catch(function(err) {
                    console.error('[登录页] 登录错误:', err);
                    alert('登录失败: ' + (err.message || '网络错误'));
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                });
            }
            
            // 绑定事件
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', checkLoginStatus);
            } else {
                checkLoginStatus();
            }
            
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
        })();
    </script>
</body>
</html>
