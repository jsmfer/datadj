<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试登录</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #1e3a8a; color: white; }
        .container { max-width: 400px; margin: 0 auto; background: white; color: #333; padding: 30px; border-radius: 10px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; cursor: pointer; }
        button:hover { background: #1e40af; }
        .log { margin-top: 20px; padding: 10px; background: #f3f4f6; border-radius: 5px; font-size: 12px; max-height: 200px; overflow: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h2>后台登录测试</h2>
        <input type="text" id="phone" value="admin" placeholder="账号">
        <input type="password" id="password" value="admin123" placeholder="密码">
        <button onclick="doLogin()">登录</button>
        <button onclick="checkToken()">检查当前Token</button>
        <button onclick="clearToken()">清除Token</button>
        <button onclick="goToAdmin()">进入管理后台</button>
        <div id="log" class="log"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3002/api';
        
        function log(msg, isError) {
            const logEl = document.getElementById('log');
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + msg;
            div.className = isError ? 'error' : '';
            logEl.appendChild(div);
            console.log(msg);
        }
        
        async function doLogin() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            log('开始登录...');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                
                log('收到响应，状态: ' + response.status);
                
                const result = await response.json();
                
                if (!result.success) {
                    log('登录失败: ' + result.message, true);
                    return;
                }
                
                log('登录成功! 用户名: ' + result.data.user.username);
                log('角色: ' + result.data.user.role);
                
                // 检查权限
                const role = result.data.user.role;
                if (role !== 'admin' && role !== 'regulator') {
                    log('没有管理员权限!', true);
                    return;
                }
                
                // 保存token
                localStorage.setItem('adminToken', result.data.token);
                log('Token已保存到localStorage');
                
                // 显示token前50个字符
                log('Token: ' + result.data.token.substring(0, 50) + '...');
                
            } catch (error) {
                log('错误: ' + error.message, true);
            }
        }
        
        function checkToken() {
            const token = localStorage.getItem('adminToken');
            if (token) {
                log('当前Token: ' + token.substring(0, 50) + '...');
            } else {
                log('没有保存的Token', true);
            }
        }
        
        function clearToken() {
            localStorage.removeItem('adminToken');
            log('Token已清除');
        }
        
        function goToAdmin() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                log('请先登录!', true);
                return;
            }
            log('跳转到管理后台...');
            window.location.href = './index.html';
        }
        
        // 页面加载时检查token
        window.onload = function() {
            log('页面加载完成');
            checkToken();
        };
    </script>
</body>
</html>
